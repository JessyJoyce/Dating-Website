<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYDNR - Sign-up Page</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> 

</head>
<body class="bg-light d-flex flex-column justify-content-center align-items-center" style="height: 100vh;">
    <div class="text-center mb-4 ">
        <h1 style="font-size: 50px; font-weight: bold; font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">Welcome to FYNDR Dating App</h1>
        <p style="margin-top: 1.5rem; margin-bottom: 1rem; font-size: 20px; font-weight: 400; font-style: italic;">
            Where a swipe matches you with your soulmate 🔥
        </p>
    </div>
    
    <div class="container" style="max-width: 500px; background-color: rgb(228, 126, 138);  border: 2px solid rgb(228, 126, 138);">

        <!-- Logo and App Name -->
        <div class="text-center mb-4">
            <img src="./images/meetic-svgrepo-com.svg" alt="FYDNR Logo" height="50" width="70">
            <h2 class="mt-2 fw-bold">FYDNR</h2>
            <p class="text-muted">Create your account</p>
        </div>

        <!-- Sign Up Form -->

        <form class="row g-3 bg-white p-4 rounded" style="border: 5px solid rgb(228, 126, 138);">
            <div class="col-12">
                <label for="validationDefault01" class="form-label">First name</label>
                <input type="text" class="form-control" id="validationDefault01"  required>
            </div>
            <div class="col-12">
                <label for="validationDefault02" class="form-label">Last name</label>
                <input type="text" class="form-control" id="validationDefault02"  required>
            </div>
            <div class="col-12">
                <label for="validationDefaultUsername" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text" id="inputGroupPrepend2">@</span>
                    <input type="text" class="form-control" id="validationDefaultUsername" aria-describedby="inputGroupPrepend2" required>
                </div>
            </div>

            <!-- Gender radio buttons -->
            <div class="col-12">
                <label class="form-label" for="genderSelect">Gender</label>
                <select class="form-select" id="genderSelect" name="gender" required>
                    <option value="" selected disabled>Select your gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Trans">Trans</option>
                    <option value="Non-Binary">Non-Binary</option>
                    <option value="Others">Others</option>
                </select>
            </div>

            <div class="col-md-6">
                <label for="validationDefault03" class="form-label">City</label>
                <input type="text" class="form-control" id="validationDefault03" required>
            </div>

            <div class="col-md-3">
                <label for="validationDefault04" class="form-label">State</label>
                <select class="form-select" id="validationDefault04" required>
                    <option selected disabled value="">Choose...</option>
                    <option>California</option>
                    <option>Texas</option>
                    <option>New Jersey</option>
                    <option>Florida</option>
                    <option>Virginia</option>
                    <option>Ohio</option>
                    <option>Georgia</option>
                    <option>Colorado</option>
                    <option>Washington</option>
                    <option>Maryland</option>
                    <option>Missouri</option>
                    <option>Kentucky</option>
                    <option>New Hampshire</option>
                    <option>Arkansas</option>
                    <option>South Carolina</option>
                    <option>Rhode Island</option>
                    <option>Iowa</option>
                </select>

            </div>
            <div class="col-md-3">
                <label for="zipcode" class="form-label">Zip</label>
                <input type="text" class="form-control" id="zipcode" name="zip" pattern="^\d{5}(-\d{4}?$)" required>

                <div class="invalid-feedback">
                    Please enter a valid ZIP code. 
                </div>
            </div>

            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="invalidCheck2" required>
                    <label class="form-check-label" for="invalidCheck2">
                        Agree to terms and conditions
                    </label>
                </div>
            </div>
            <div class="col-12">
                <button class="btn w-100 text" type="submit" style="background-color: rgb(219, 65, 83); color: white;">Sign Up</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        document.getElementById("zipcode").addEventListener("blur", function() {
            const zip = this.value;
            const zipPattern = /^\d{5}(-\d{4})?$/;

            if (!zipPattern.test(zip)) {
                alert("Please enetr a valid ZIP code.");
                this.value = "";  // stops form from submitting
            }
        });
    </script>

</body>
</html>
